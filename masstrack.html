<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MassTrack"/>
  <title>MassTrack 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0a0f;color:#fff;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}
    ::-webkit-scrollbar{width:0}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .screen{min-height:100vh;padding-bottom:100px;animation:slideUp 0.3s ease}
    .screen-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

    /* inputs */
    .inp{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;appearance:none;-webkit-appearance:none}
    .inp:focus{border-color:rgba(249,115,22,0.5)}
    select.inp option{background:#1a1a2e;color:#fff}
    label.lbl{display:block;margin-bottom:6px;font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}

    /* buttons */
    .btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 4px 24px rgba(249,115,22,0.4)}
    .btn-ghost{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}
    .btn-sex{flex:1;padding:10px 0;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;text-transform:capitalize;transition:all 0.2s}
    .btn-sex.active{border-color:#f97316;background:rgba(249,115,22,0.15);color:#f97316}
    .btn-activity{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);cursor:pointer;width:100%;transition:all 0.2s;text-align:left}
    .btn-activity.active{border-color:#f97316;background:rgba(249,115,22,0.12)}
    .btn-activity .name{font-weight:600;font-size:13px;color:rgba(255,255,255,0.7)}
    .btn-activity.active .name{color:#f97316}
    .btn-activity .desc{font-size:11px;color:rgba(255,255,255,0.3)}
    .btn-mode{flex:1;padding:12px 0;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5);font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s}
    .btn-mode.active{border-color:#f97316;background:rgba(249,115,22,0.15);color:#f97316}

    /* cards */
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px}
    .card-orange{background:linear-gradient(135deg,rgba(249,115,22,0.12),rgba(239,68,68,0.08));border:1px solid rgba(249,115,22,0.2);border-radius:24px;padding:24px;margin-bottom:14px;position:relative;overflow:hidden}
    .card-dark{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:20px;margin-bottom:14px}

    /* meal item */
    .meal-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .meal-name{font-weight:600;font-size:14px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .meal-time{font-size:10px;color:rgba(255,255,255,0.25);flex-shrink:0}
    .macro-tag{font-size:11px}

    /* toast */
    #toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:fadeIn 0.3s ease;white-space:nowrap;display:none}

    /* fab */
    #fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f97316,#ef4444);border:none;color:#fff;border-radius:50px;padding:16px 32px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 8px 32px rgba(249,115,22,0.5);display:flex;align-items:center;gap:8px;white-space:nowrap;z-index:100}

    /* progress bar */
    .pbar-track{height:8px;background:rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;margin-bottom:10px}
    .pbar-fill{height:100%;border-radius:8px;transition:width 0.7s cubic-bezier(.4,0,.2,1)}

    /* photo zone */
    .photo-zone{width:100%;padding:48px 0;border-radius:20px;border:2px dashed rgba(249,115,22,0.3);background:rgba(249,115,22,0.05);color:rgba(255,255,255,0.6);font-size:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:12px}
    .photo-loading{text-align:center;padding:48px}

    /* macro result grid */
    .macro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
    .macro-cell{border-radius:14px;padding:12px 14px}
    .macro-cell .val{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
    .macro-cell .lbl2{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
    .macro-total{border-radius:14px;padding:14px 16px;grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2)}

    .section-label{color:rgba(255,255,255,0.4);margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:1px}
    .flex-row{display:flex;gap:10px}
    .flex-col{display:flex;flex-direction:column;gap:8px}
    .mb14{margin-bottom:14px}
    .mb16{margin-bottom:16px}
    .mb18{margin-bottom:18px}
    .mb20{margin-bottom:20px}
    .mb24{margin-bottom:24px}
    .mb36{margin-bottom:36px}
    .mt10{margin-top:10px}
    .logo-box{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#f97316,#ef4444);margin-bottom:16px;font-size:28px;box-shadow:0 0 32px rgba(249,115,22,0.25)}
    .maxw{max-width:480px;margin:0 auto;padding:0 20px}
    .profile-maxw{width:100%;max-width:440px}
  </style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>

<script>
// ─── Storage ────────────────────────────────────────────────────────────────
const LS = {
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ─── State ──────────────────────────────────────────────────────────────────
let state = {
  screen: LS.get('mt_goal') ? 'home' : 'profile',
  profile: LS.get('mt_profile', {age:'',weight:'',height:'',activity:1.55,sex:'homme'}),
  goal: LS.get('mt_goal', null),
  meals: LS.get('mt_meals', []),
  addMode: 'manual',
  photoResult: null,
  photoLoading: false,
  manualFood: {name:'',quantity:'',unit:'g',brand:'',meal:'Déjeuner'},
  manualResult: null,
  manualLoading: false,
};

const save = () => {
  LS.set('mt_profile', state.profile);
  LS.set('mt_goal', state.goal);
  LS.set('mt_meals', state.meals);
};

const today = new Date().toDateString();

const ACTIVITIES = [
  {label:'Sédentaire',value:1.2,desc:"Peu ou pas d'exercice"},
  {label:'Légèrement actif',value:1.375,desc:'1–3 jours/semaine'},
  {label:'Modérément actif',value:1.55,desc:'3–5 jours/semaine'},
  {label:'Très actif',value:1.725,desc:'6–7 jours/semaine'},
  {label:'Extrêmement actif',value:1.9,desc:'Athlète / travail physique'},
];
const MEALS = ['Petit-déjeuner','Déjeuner','Dîner','Collation'];
const UNITS = ['g','ml','cl','portion','tranche','unité'];

// ─── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='err' ? '#ef4444' : '#22c55e';
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.display='none'; }, 2800);
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'profile') app.innerHTML = renderProfile();
  else if (state.screen === 'add') app.innerHTML = renderAdd();
  else app.innerHTML = renderHome();
  bindEvents();
}

// ─── PROFILE ─────────────────────────────────────────────────────────────────
function renderProfile() {
  const p = state.profile;
  return `
  <div class="screen-center">
    <div class="profile-maxw">
      <div style="text-align:center" class="mb36">
        <div class="logo-box">🔥</div>
        <h1 style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;margin:0">MassTrack</h1>
        <p style="color:rgba(255,255,255,0.4);margin-top:6px;font-size:14px">Tes calories pour la prise de masse</p>
      </div>
      <div class="card">
        <div class="mb18">
          <label class="lbl">Sexe</label>
          <div class="flex-row">
            <button class="btn-sex ${p.sex==='homme'?'active':''}" data-sex="homme">Homme</button>
            <button class="btn-sex ${p.sex==='femme'?'active':''}" data-sex="femme">Femme</button>
          </div>
        </div>
        ${[['age','Âge','22','ans'],['weight','Poids','75','kg'],['height','Taille','178','cm']].map(([k,l,ph,u])=>`
        <div class="mb16">
          <label class="lbl">${l}</label>
          <div style="position:relative">
            <input class="inp" type="number" placeholder="ex: ${ph}" value="${p[k]||''}" data-field="${k}"/>
            <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);font-size:13px">${u}</span>
          </div>
        </div>`).join('')}
        <div class="mb24">
          <label class="lbl">Niveau d'activité</label>
          <div class="flex-col">
            ${ACTIVITIES.map(a=>`
            <button class="btn-activity ${p.activity==a.value?'active':''}" data-activity="${a.value}">
              <span class="name">${a.label}</span>
              <span class="desc">${a.desc}</span>
            </button>`).join('')}
          </div>
        </div>
        <button class="btn-primary" id="btn-calc" ${!p.age||!p.weight||!p.height?'style="opacity:0.4"':''}>
          ${state.goal ? '💾 Mettre à jour mon profil' : 'Calculer mon objectif 🚀'}
        </button>
        ${state.goal ? `<button class="btn-ghost mt10" id="btn-back-home">← Retour au tableau de bord</button>` : ''}
      </div>
    </div>
  </div>`;
}

// ─── ADD ─────────────────────────────────────────────────────────────────────
function renderAdd() {
  const m = state.addMode;
  return `
  <div class="screen" style="padding:20px;padding-bottom:40px">
    <div class="maxw" style="padding-top:0">
      <div class="flex-row mb24" style="align-items:center;gap:12px;padding:0">
        <button id="btn-back" style="background:rgba(255,255,255,0.06);border:none;color:#fff;width:40px;height:40px;border-radius:12px;cursor:pointer;font-size:18px;flex-shrink:0">←</button>
        <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin:0">Ajouter un repas</h2>
      </div>
      <div class="flex-row mb24">
        <button class="btn-mode ${m==='manual'?'active':''}" data-mode="manual">✏️ Saisie</button>
        <button class="btn-mode ${m==='photo'?'active':''}" data-mode="photo">📸 Photo IA</button>
      </div>
      ${m==='photo' ? renderPhotoMode() : renderManualMode()}
    </div>
  </div>`;
}

function renderPhotoMode() {
  if (state.photoLoading) return `
    <div class="photo-loading">
      <div style="font-size:48px;animation:spin 1s linear infinite;display:inline-block">🔍</div>
      <p style="color:rgba(255,255,255,0.5);margin-top:16px">Analyse IA en cours…</p>
    </div>`;
  if (state.photoResult) return renderMacroResult(state.photoResult, 'photo');
  return `
    <label class="photo-zone" for="photo-input">
      <span style="font-size:48px">📷</span>
      <span style="font-family:'Syne',sans-serif;font-weight:700;color:#f97316;font-size:16px">Prendre une photo</span>
      <span>ou importer depuis ta galerie</span>
    </label>
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none"/>`;
}

function renderManualMode() {
  if (state.manualResult) return renderMacroResult(state.manualResult, 'manual');
  const f = state.manualFood;
  return `
    <div class="card">
      <div class="mb14">
        <label class="lbl">Nom de l'aliment *</label>
        <input class="inp" type="text" id="food-name" placeholder="ex: Blanc de poulet, Riz basmati…" value="${esc(f.name)}"/>
      </div>
      <div class="flex-row mb14">
        <div style="flex:2">
          <label class="lbl">Quantité *</label>
          <input class="inp" type="number" id="food-qty" placeholder="ex: 150" value="${esc(f.quantity)}"/>
        </div>
        <div style="flex:1">
          <label class="lbl">Unité</label>
          <select class="inp" id="food-unit">
            ${UNITS.map(u=>`<option value="${u}" ${f.unit===u?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="mb14">
        <label class="lbl">Marque <span style="color:rgba(255,255,255,0.2);text-transform:none;letter-spacing:0;font-size:11px">(optionnel)</span></label>
        <input class="inp" type="text" id="food-brand" placeholder="ex: Danone, Bjorg, Fleury Michon…" value="${esc(f.brand)}"/>
      </div>
      <div class="mb20">
        <label class="lbl">Type de repas</label>
        <select class="inp" id="food-meal">
          ${MEALS.map(ml=>`<option value="${ml}" ${f.meal===ml?'selected':''}>${ml}</option>`).join('')}
        </select>
      </div>
      <button class="btn-primary" id="btn-lookup" ${!f.name||!f.quantity||state.manualLoading?'style="opacity:0.4"':''}>
        ${state.manualLoading ? '<span style="animation:spin 1s linear infinite;display:inline-block">⚙️</span> Calcul en cours…' : '🔍 Calculer les calories'}
      </button>
    </div>`;
}

function renderMacroResult(r, source) {
  return `
    <div class="card">
      <div class="flex-row mb16" style="justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <h3 style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin:0">${esc(r.name)}</h3>
          ${r.per_unit ? `<span style="font-size:12px;color:rgba(255,255,255,0.35)">pour ${r.per_unit}</span>` : ''}
          ${r.details ? `<p style="font-size:12px;color:rgba(255,255,255,0.35);margin:4px 0 0;font-style:italic">${esc(r.details)}</p>` : ''}
        </div>
        <span style="font-size:11px;padding:3px 10px;border-radius:20px;flex-shrink:0;margin-left:10px;background:${r.confidence==='haute'?'rgba(34,197,94,0.15)':'rgba(249,115,22,0.15)'};color:${r.confidence==='haute'?'#22c55e':'#f97316'};font-weight:600">
          Confiance ${r.confidence}
        </span>
      </div>
      ${r.note ? `<p style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:12px;font-style:italic">ℹ️ ${esc(r.note)}</p>` : ''}
      <div class="macro-grid">
        <div class="macro-total">
          <span style="color:rgba(255,255,255,0.6);font-size:13px">Énergie totale</span>
          <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:#ef4444">${r.calories} <span style="font-size:14px;font-weight:600">kcal</span></span>
        </div>
        ${[
          {label:'Protéines',val:r.proteins,color:'#f97316',bg:'rgba(249,115,22,0.1)',border:'rgba(249,115,22,0.2)'},
          {label:'Glucides',val:r.carbs,color:'#3b82f6',bg:'rgba(59,130,246,0.1)',border:'rgba(59,130,246,0.2)'},
          {label:'Lipides',val:r.fats,color:'#a855f7',bg:'rgba(168,85,247,0.1)',border:'rgba(168,85,247,0.2)'},
          {label:'Fibres',val:r.fiber,color:'#22c55e',bg:'rgba(34,197,94,0.1)',border:'rgba(34,197,94,0.2)'},
        ].map(x=>`<div class="macro-cell" style="background:${x.bg};border:1px solid ${x.border}">
          <div class="val" style="color:${x.color}">${x.val??'–'}<span style="font-size:12px">g</span></div>
          <div class="lbl2">${x.label}</div>
        </div>`).join('')}
      </div>
      <div class="mb16">
        <label class="lbl">Type de repas</label>
        <select class="inp" id="result-meal">
          ${MEALS.map(ml=>`<option value="${ml}" ${r.meal===ml?'selected':''}>${ml}</option>`).join('')}
        </select>
      </div>
      <div class="flex-row">
        <button style="flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600" id="btn-retry-${source}">
          ${source==='photo' ? 'Nouvelle photo' : '← Modifier'}
        </button>
        <button style="flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;box-shadow:0 4px 16px rgba(249,115,22,0.4)" id="btn-add-meal">
          Ajouter ✓
        </button>
      </div>
    </div>`;
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome() {
  const todayMeals = state.meals.filter(m => m.day === today);
  const totalCal  = todayMeals.reduce((s,m)=>s+(m.calories||0),0);
  const totalProt = todayMeals.reduce((s,m)=>s+(m.proteins||0),0);
  const totalCarbs= todayMeals.reduce((s,m)=>s+(m.carbs||0),0);
  const totalFats = todayMeals.reduce((s,m)=>s+(m.fats||0),0);
  const g = state.goal || {};
  const pct = g.target ? Math.min((totalCal/g.target)*100,100) : 0;
  const rem = g.target ? g.target - totalCal : 0;
  const circ = 2*Math.PI*38;
  const offset = circ*(1-pct/100);
  const dateStr = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  const journalHtml = todayMeals.length===0
    ? `<div style="text-align:center;padding:32px;color:rgba(255,255,255,0.2);font-size:14px">Aucun repas ajouté.<br/>Commence à logger ! 💪</div>`
    : MEALS.map(mtype => {
        const items = todayMeals.filter(m=>m.meal===mtype);
        if(!items.length) return '';
        const mCal = items.reduce((s,i)=>s+(i.calories||0),0);
        return `<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-family:'Syne',sans-serif;font-weight:700;color:rgba(255,255,255,0.6);font-size:13px">${mtype}</span>
            <span style="font-size:12px;color:#f97316;font-weight:600">${Math.round(mCal)} kcal</span>
          </div>
          ${items.map(item=>`
          <div class="meal-item">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px">
                <span class="meal-name">${esc(item.name)}</span>
                <span class="meal-time">${item.time}</span>
              </div>
              <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
                ${item.proteins>0?`<span class="macro-tag" style="color:#f97316">P: ${item.proteins}g</span>`:''}
                ${item.carbs>0?`<span class="macro-tag" style="color:#3b82f6">G: ${item.carbs}g</span>`:''}
                ${item.fats>0?`<span class="macro-tag" style="color:#a855f7">L: ${item.fats}g</span>`:''}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:8px">
              <span style="font-family:'Syne',sans-serif;font-weight:800;color:#f97316;font-size:16px">${item.calories}</span>
              <button class="btn-del" data-id="${item.id}" style="background:rgba(239,68,68,0.1);border:none;color:#ef4444;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:16px">×</button>
            </div>
          </div>`).join('')}
        </div>`;
      }).join('');

  return `
  <div class="screen">
    <div style="padding:20px 20px 0;max-width:480px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div>
          <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px;margin:0">MassTrack 🔥</h1>
          <p style="color:rgba(255,255,255,0.3);margin:2px 0 0;font-size:12px">${dateStr}</p>
        </div>
        <button id="btn-profile" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);padding:6px 14px;border-radius:10px;cursor:pointer;font-size:12px">⚙️ Profil</button>
      </div>
    </div>
    <div class="maxw" style="padding-top:16px">

      <div class="card-orange">
        <div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(249,115,22,0.06);pointer-events:none"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div>
            <p style="color:rgba(255,255,255,0.4);margin:0;font-size:12px;text-transform:uppercase;letter-spacing:1px">Calories aujourd'hui</p>
            <div style="display:flex;align-items:baseline;gap:6px;margin-top:4px">
              <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:42px">${Math.round(totalCal)}</span>
              <span style="color:rgba(255,255,255,0.3);font-size:16px">/ ${g.target||'–'} kcal</span>
            </div>
            <p style="margin:4px 0 0;font-size:13px;color:${rem>=0?'#22c55e':'#ef4444'};font-weight:600">
              ${rem>=0 ? `${Math.round(rem)} kcal restantes` : `${Math.abs(Math.round(rem))} kcal dépassées`}
            </p>
          </div>
          <div style="position:relative">
            <svg width="90" height="90" style="transform:rotate(-90deg)">
              <circle cx="45" cy="45" r="38" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9"/>
              <circle cx="45" cy="45" r="38" fill="none" stroke="${pct>100?'#ef4444':'#f97316'}" stroke-width="9"
                stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
              <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px">${Math.round(pct)}%</span>
            </div>
          </div>
        </div>
        <div class="pbar-track">
          <div class="pbar-fill" style="width:${pct}%;background:${pct>100?'#ef4444':'linear-gradient(90deg,#f97316,#ef4444)'};box-shadow:0 0 12px rgba(249,115,22,0.5)"></div>
        </div>
      </div>

      <div class="card-dark">
        <p class="section-label">Macronutriments</p>
        ${g.target ? [
          {label:'Protéines',val:totalProt,max:g.proteins,color:'#f97316'},
          {label:'Glucides',val:totalCarbs,max:g.carbs,color:'#3b82f6'},
          {label:'Lipides',val:totalFats,max:g.fats,color:'#a855f7'},
        ].map(x=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:12px;color:rgba(255,255,255,0.6)">${x.label}</span>
              <span style="font-size:12px;color:${x.color};font-family:'Syne',sans-serif;font-weight:700">${Math.round(x.val)}g / ${x.max}g</span>
            </div>
            <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden">
              <div style="height:100%;width:${Math.min((x.val/x.max)*100,100)}%;background:${x.color};border-radius:6px;box-shadow:0 0 8px ${x.color}80"></div>
            </div>
          </div>`).join('') : '<p style="color:rgba(255,255,255,0.3);font-size:13px">Configure ton profil pour voir tes macros</p>'}
      </div>

      ${g.target ? `
      <div class="card-dark" style="padding:16px">
        <p class="section-label">🎯 Objectif prise de masse</p>
        <div style="display:flex;justify-content:space-around">
          ${[{label:'Maintenance',val:g.tdee,unit:'kcal'},{label:'Surplus',val:'+400',unit:'kcal'},{label:'Objectif',val:g.target,unit:'kcal',hl:true}].map(x=>`
          <div style="text-align:center">
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:${x.hl?'#f97316':'#fff'}">${x.val}</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px">${x.unit}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px">${x.label}</div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <div style="margin-bottom:16px">
        <p class="section-label">Journal du jour</p>
        ${journalHtml}
      </div>
    </div>
    <button id="fab">
      <span style="font-size:20px">+</span> Ajouter un repas
    </button>
  </div>`;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function calcGoal() {
  const p = state.profile;
  if (!p.age||!p.weight||!p.height) return;
  const a=+p.age, w=+p.weight, h=+p.height, act=+p.activity;
  const bmr = p.sex==='homme' ? 88.362+13.397*w+4.799*h-5.677*a : 447.593+9.247*w+3.098*h-4.330*a;
  const tdee = bmr*act;
  const target = Math.round(tdee+400);
  const proteins = Math.round(w*2.2);
  const fats = Math.round((target*0.25)/9);
  const carbs = Math.round((target-proteins*4-fats*9)/4);
  state.goal = {target,proteins,carbs,fats,tdee:Math.round(tdee)};
  save();
  showToast('Profil sauvegardé ✓');
  state.screen='home';
  render();
}

function addMeal(food) {
  const entry = {...food, id:Date.now(), day:today, time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})};
  state.meals.push(entry);
  state.photoResult = null;
  state.manualResult = null;
  state.manualFood = {name:'',quantity:'',unit:'g',brand:'',meal:'Déjeuner'};
  save();
  showToast(`${food.name} ajouté !`);
  state.screen='home';
  render();
}

async function lookupFood() {
  const f = state.manualFood;
  if (!f.name||!f.quantity) return;
  state.manualLoading = true;
  render();
  try {
    const prompt = `Calcule les valeurs nutritionnelles pour:\n- Aliment: ${f.name}\n- Quantité: ${f.quantity} ${f.unit}\n${f.brand?`- Marque: ${f.brand}`:''}\n\nRéponds UNIQUEMENT en JSON valide, sans markdown ni backticks:\n{"name":"nom complet","calories":nombre,"proteins":nombre,"carbs":nombre,"fats":nombre,"fiber":nombre,"per_unit":"${f.quantity}${f.unit}","confidence":"haute/moyenne/basse","note":"info utile si besoin"}\nToutes les valeurs en nombres entiers.`;
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('')||'';
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    state.manualResult = {...parsed, meal:f.meal};
  } catch { showToast('Aliment non reconnu, réessaie','err'); }
  state.manualLoading = false;
  render();
}

async function analyzePhoto(file) {
  state.photoLoading = true;
  render();
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:base64}},{type:'text',text:'Analyse cet aliment. Réponds UNIQUEMENT en JSON valide sans markdown:\n{"name":"nom","calories":nombre,"proteins":nombre,"carbs":nombre,"fats":nombre,"fiber":nombre,"details":"description","confidence":"haute/moyenne/basse"}'}]}]})});
      const data = await res.json();
      const text = data.content?.map(c=>c.text||'').join('')||'';
      const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      state.photoResult = {...parsed, meal:'Déjeuner'};
    } catch { showToast("Erreur d'analyse, réessaie",'err'); }
    state.photoLoading = false;
    render();
  };
  reader.readAsDataURL(file);
}

// ─── Event binding ────────────────────────────────────────────────────────────
function bindEvents() {
  // Profile
  document.querySelectorAll('[data-sex]').forEach(b=>b.addEventListener('click',()=>{
    state.profile.sex=b.dataset.sex; render();
  }));
  document.querySelectorAll('[data-activity]').forEach(b=>b.addEventListener('click',()=>{
    state.profile.activity=+b.dataset.activity; render();
  }));
  document.querySelectorAll('[data-field]').forEach(inp=>inp.addEventListener('input',()=>{
    state.profile[inp.dataset.field]=inp.value; render();
  }));
  document.getElementById('btn-calc')?.addEventListener('click', calcGoal);
  document.getElementById('btn-back-home')?.addEventListener('click',()=>{ state.screen='home'; render(); });

  // Home
  document.getElementById('btn-profile')?.addEventListener('click',()=>{ state.screen='profile'; render(); });
  document.getElementById('fab')?.addEventListener('click',()=>{ state.screen='add'; render(); });
  document.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',()=>{
    const id=+b.dataset.id;
    state.meals=state.meals.filter(m=>m.id!==id);
    save(); render();
  }));

  // Add screen
  document.getElementById('btn-back')?.addEventListener('click',()=>{ state.screen='home'; render(); });
  document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{
    state.addMode=b.dataset.mode; state.photoResult=null; state.manualResult=null; render();
  }));

  // Photo
  document.getElementById('photo-input')?.addEventListener('change',e=>{
    if(e.target.files[0]) analyzePhoto(e.target.files[0]);
  });
  document.getElementById('btn-retry-photo')?.addEventListener('click',()=>{
    state.photoResult=null; render();
  });

  // Manual
  document.getElementById('food-name')?.addEventListener('input',e=>{ state.manualFood.name=e.target.value; });
  document.getElementById('food-qty')?.addEventListener('input',e=>{ state.manualFood.quantity=e.target.value; });
  document.getElementById('food-unit')?.addEventListener('change',e=>{ state.manualFood.unit=e.target.value; });
  document.getElementById('food-brand')?.addEventListener('input',e=>{ state.manualFood.brand=e.target.value; });
  document.getElementById('food-meal')?.addEventListener('change',e=>{ state.manualFood.meal=e.target.value; });
  document.getElementById('btn-lookup')?.addEventListener('click', lookupFood);
  document.getElementById('btn-retry-manual')?.addEventListener('click',()=>{ state.manualResult=null; render(); });

  // Result
  document.getElementById('result-meal')?.addEventListener('change',e=>{
    if(state.photoResult) state.photoResult.meal=e.target.value;
    if(state.manualResult) state.manualResult.meal=e.target.value;
  });
  document.getElementById('btn-add-meal')?.addEventListener('click',()=>{
    const food = state.photoResult || state.manualResult;
    if(food) addMeal(food);
  });
}

// ─── Start ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
